<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 40px 16px;
            color: #1f2937;
        }

        .card {
            max-width: 460px;
            margin: 40px auto;
            background: #fff;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .stack {
            display: grid;
            gap: 12px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 12px 14px;
            cursor: pointer;
            font-size: 14px;
            background: #2563eb;
            color: #fff;
        }

        a {
            color: #2563eb;
            text-decoration: none;
        }

        ul {
            color: #6b7280;
        }
        ::placeholder {
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create Account</h1>
        <form method="post" class="stack">
            {% csrf_token %}
            {{ form.username }}
            {{ form.email }}
            {{ form.password1 }}
            {{ form.password2 }}
            <button type="submit">Sign up</button>
        </form>
        <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
</body>
</html>
